
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Wisuda UNIGHA - Universitas Jabal Ghafur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #002366 0%, #800000 100%);
        }

        .btn-gold {
            background: linear-gradient(to right, #D4AF37, #F5D76E);
            color: #002366;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .announcement-frame {
            border: 8px solid white;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.2);
            border-radius: 1.5rem;
            overflow: hidden;
            background: white;
            transition: transform 0.3s ease;
        }

        .announcement-frame:hover {
            transform: scale(1.01);
        }

        .tag-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

/* =========================
   TOPBAR ADMIN (FIXED)
========================= */
#topbarAdmin {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 9999;

  /* visual */
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.9);
}

#topbarAdmin {
  transition: all 0.3s ease;
}

.btn-edit {
  opacity: 0;
  transition: 0.2s;
}

.flex:hover .btn-edit {
  opacity: 1;
}

@keyframes scaleIn {
    0% {
        transform: scale(0.9);
        opacity: 0;
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}

.animate-scaleIn {
    animation: scaleIn 0.25s ease;
}

    </style>
</head>

<!-- TOPBAR ADMIN -->
<div id="topbarAdmin" class="bg-white shadow px-4 py-3 flex justify-between items-center" style="display:none;">
    
    <!-- KIRI (NAMA USER) -->
    <div class="flex items-center gap-2">
        <i data-lucide="user"></i>
        <span id="namaUser" class="font-semibold text-sm"></span>
    </div>

    <!-- KANAN (SETTING + LOGOUT) -->
    <div class="flex items-center gap-4">

        <!-- SETTING -->
        <button onclick="bukaSetting()" 
            class="text-gray-600 hover:text-blue-600 flex items-center gap-1 text-sm">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>

        <!-- LOGOUT -->
        <button onclick="logout()" 
            class="text-red-600 text-sm font-bold flex items-center gap-1">
            <i data-lucide="log-out"></i> Keluar
        </button>

    </div>

</div>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">Loading app...</div>
    <iframe 
      src="https://script.google.com/macros/s/AKfycbxzc7a5Lfsvf2MDdJg4uRpkGGvFWB8E5XIKYoXTQObDntszy3Y4jXuBmY3XGBJNpCOAhg/exec" 
      title="JNCfy Web App"
      onload="document.getElementById('loader').style.display='none';"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
