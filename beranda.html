<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisuda Unigha</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Inter & Playfair Display for academic feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-blue: #002366;
            --royal-maroon: #800000;
            --whatsapp-green: #25D366;
        }

        img:hover {
    transform: scale(1.05);
    transition: 0.3s;
}
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .academic-header {
            font-family: 'Playfair Display', serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--deep-blue) 0%, var(--royal-maroon) 100%);
        }

        .gold-button {
            background: linear-gradient(to right, #D4AF37, #F5D76E);
            color: #002366;
            transition: all 0.3s ease;
        }

        .gold-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .wa-button {
            background-color: var(--whatsapp-green);
            color: white;
            transition: all 0.3s ease;
        }

        .wa-button:hover {
            background-color: #1eb956;
            transform: scale(1.02);
        }

        .form-card {
            border-top: 4px solid var(--primary-gold);
        }

        .step-active {
            color: var(--primary-gold);
            border-color: var(--primary-gold);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-gold);
            border-radius: 4px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .stepper-text {
                display: none;
            }
            .step-active .stepper-text {
                display: block;
                font-size: 10px;
            }
        }

footer img:hover {
    transform: scale(1.1);
    transition: 0.3s;
}

a:hover img {
    transform: scale(1.15);
    transition: 0.3s;
}

/* =========================
   MODE ADMIN (JARAK KONTEN)
========================= */
body.admin-mode {
  padding-top: 70px; /* sesuaikan tinggi topbar */
}

/* =========================
   TOPBAR ADMIN (FIXED)
========================= */
#topbarAdmin {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 9999;

  /* visual */
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.9);
}

#topbarAdmin {
  transition: all 0.3s ease;
}

    </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">Loading app...</div>
    <iframe 
      src="https://script.google.com/macros/s/AKfycbxzc7a5Lfsvf2MDdJg4uRpkGGvFWB8E5XIKYoXTQObDntszy3Y4jXuBmY3XGBJNpCOAhg/exec?page=beranda.html" 
      title="Wisuda Unigha"
      onload="document.getElementById('loader').style.display='none';"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
