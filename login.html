<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
}

/* BACKGROUND */
.bg-animated{
  background:linear-gradient(-45deg,#002366,#1e3a8a,#3b82f6,#ffffff);
  background-size:400% 400%;
  animation:gradientMove 10s ease infinite;
}
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* CARD */
.glass{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* INPUT */
.input-modern{
  border:1px solid #e5e7eb;
  transition:0.3s;
}
.input-modern:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

/* BUTTON */
.btn-modern{
  background:linear-gradient(to right,#1e3a8a,#3b82f6);
  transition:0.3s;
}
.btn-modern:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(59,130,246,0.4);
}
</style>
</head>

<body class="bg-animated min-h-screen flex items-center justify-center">

<div class="glass max-w-sm w-full p-8 rounded-2xl">

  <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">
    🔐 Login Admin
  </h2>

  <input id="username" type="text" placeholder="Username"
    class="input-modern w-full mb-4 px-4 py-3 rounded-lg outline-none">

  <input id="password" type="password" placeholder="Password"
    class="input-modern w-full mb-4 px-4 py-3 rounded-lg outline-none">

  <button id="btnLogin"
    class="btn-modern text-white w-full py-3 rounded-lg font-semibold">
    Masuk
  </button>

  <p id="loginMsg" class="text-center mt-4 text-red-500 text-sm"></p>

</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbxspDVIhTPHmTYUNWzO197Ul9W6cwwX5YK0UVyvLpIFU6ghA51BO0coVp6VHwsiPDJbvA/exec";


// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  autoRedirect();
  initEvent();
});


// ================= AUTO REDIRECT =================
function autoRedirect(){
  if(localStorage.getItem("role") === "admin"){
    // 🔥 langsung lompat tanpa bisa back
    window.top.location.replace(BASE_URL + "?page=admin");
  }
}


// ================= EVENT =================
function initEvent(){

  const btn = document.getElementById("btnLogin");

  btn.addEventListener("click", login);

  document.addEventListener("keydown", function(e){
    if(e.key === "Enter") login();
  });

}


// ================= LOGIN =================
function login(){

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const msg  = document.getElementById("loginMsg");
  const btn  = document.getElementById("btnLogin");

  msg.innerText = "";

  if(!user || !pass){
    msg.innerText = "Username & Password wajib diisi!";
    return;
  }

  // loading state
  btn.innerText = "Memproses...";
  btn.disabled = true;

  setTimeout(() => {

    // AUTH SEMENTARA
    if(user === "salim" && pass === "oomcie"){

      localStorage.setItem("role","admin");
      localStorage.setItem("nama","Admin Wisuda");

      // 🔥 redirect aman (tidak bisa back)
      window.top.location.replace(BASE_URL + "?page=admin");

    } else {

      msg.innerText = "Username / Password salah!";
      btn.innerText = "Masuk";
      btn.disabled = false;

    }

  }, 500); // biar smooth

}

</script>

</body>
</html>
