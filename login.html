<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisuda Unigha</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f8fafc;
    margin: 0;
    padding: 0;
}

/* =========================
   FULLSCREEN IFRAME FIX
========================= */
.iframe-container {
    position: fixed;
    inset: 0; /* top:0 right:0 bottom:0 left:0 */
    width: 100%;
    height: 100%;
    background: #f8fafc;
}

/* iframe FULL layar */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* =========================
   LOADER
========================= */
.loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    z-index: 10;
    font-weight: 600;
    color: #002366;
}

/* spinner */
.loader::after {
    content: "";
    width: 30px;
    height: 30px;
    border: 4px solid #ddd;
    border-top: 4px solid #002366;
    border-radius: 50%;
    margin-left: 10px;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* =========================
   MOBILE OPTIMIZATION
========================= */
@media (max-width: 768px) {
    .loader {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="iframe-container">
    <div class="loader" id="loader">Loading aplikasi...</div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbyb8H7O8asD8AjffHsE1tnF-U551j31o5z_z3TiWFTLKjxBz9iIt1trEzgkk4Y2vRtHXA/exec?page=login"
        title="Wisuda Unigha"
        onload="hideLoader()"
        allowfullscreen>
    </iframe>
</div>

<script>
function hideLoader() {
    const loader = document.getElementById("loader");
    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 300);
}
</script>

</body>
</html>
